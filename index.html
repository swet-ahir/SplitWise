<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Splitwise — Split expenses, not friendships</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💸</text></svg>">
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen"></div>

<!-- APP SCREEN -->
<div id="app-screen" class="hidden">

  <nav class="sidebar" id="sidebar"></nav>

  <div class="main-content">

    <div class="top-bar" id="top-bar">
      <div class="d-flex align-center gap-12">
        <button class="btn btn-ghost btn-icon mobile-menu-btn" onclick="toggleMobileSidebar()">☰</button>
        <h2 id="page-title">Dashboard</h2>
      </div>
      <div class="d-flex align-center gap-8" id="topbar-actions"></div>
    </div>

    <div class="page-content" id="page-content">
      <div class="loading"><span class="spin">⟳</span>&nbsp;Loading...</div>
    </div>

<!-- Toast Container -->
<div id="toast-container"></div>

<!-- Scripts (order matters) -->
<script src="js/store.js"></script>
<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/groups.js"></script>
<script src="js/expenses.js"></script>

<script src="js/notifications.js"></script>
<script src="js/profile.js"></script>

<script>
  // Bootstrap
  document.addEventListener('DOMContentLoaded', () => {
    initApp();
  });
</script>
